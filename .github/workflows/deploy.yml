# Build and deploy the Vite app to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions (not "Deploy from a branch").
# Until this workflow completes successfully at least once, Pages may still
# show an old branch deploy (raw index.html + /src/main.tsx = white screen).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          # Must match your repository name (site URL: /${repo}/)
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Verify production output (not dev index.html)
        run: |
          test -f dist/index.html
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry — build misconfigured"
            cat dist/index.html
            exit 1
          fi
          if ! grep -qE 'assets/index-[^"]+\.js' dist/index.html; then
            echo "::error::dist/index.html missing Vite JS bundle"
            cat dist/index.html
            exit 1
          fi
          if grep -q '%BASE_URL%' dist/index.html; then
            echo "::error::dist/index.html still has unreplaced %BASE_URL%"
            exit 1
          fi
          echo "OK: dist/index.html is a Vite production build"
          head -20 dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
